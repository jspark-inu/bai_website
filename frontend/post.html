<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>글 보기 — BAI 피드</title>
  <link rel="stylesheet" href="/static/app.css?v=20260601d">
</head>
<body>
  <div id="nav"></div>
  <div class="container">
    <div class="content">
    <div id="detail"></div>
    <div class="editor hidden" id="editor">
      <label>📌 한 일/결과</label><textarea id="did"></textarea>
      <label>💡 배운 것</label><textarea id="learned"></textarea>
      <label>❓ 막힌 점/질문</label><textarea id="blocked"></textarea>
      <input class="tags" id="tags" placeholder="태그">
      <input class="tags" id="links" placeholder="산출물 링크 (공백으로 구분)">
      <button class="primary" id="saveBtn">저장</button>
    </div>
    <div class="comments" id="comments"></div>
    <div class="comment-input">
      <input id="cbody" placeholder="댓글 달기...">
      <button class="primary" id="cbtn">등록</button>
    </div>
    </div>
  </div>
  <script src="/static/feed.js?v=20260601d"></script>
  <script>
    const PID = parseInt(location.pathname.split("/").pop(), 10);
    let ME = null, POST = null;

    async function load() {
      ME = await getMe();
      if (!ME) return;
      document.getElementById("nav").innerHTML = feedSidebar("", ME && ME.role === "pi");
      document.querySelector(".side").insertAdjacentHTML("beforeend",
        `<div class="who">👤 ${esc(ME.name)}</div><button class="logout" id="logoutBtn">로그아웃</button>`);
      document.getElementById("logoutBtn").onclick = async () => { await fetch("/api/logout",{method:"POST"}); location.href="/login"; };
      const r = await fetch(`/api/post/${PID}`);
      if (!r.ok) { document.getElementById("detail").textContent = "글을 찾을 수 없습니다."; return; }
      const data = await r.json();
      POST = data.post;
      const reacted = (data.reacted_by || []).includes(ME.id);
      document.getElementById("detail").innerHTML = `
        <div class="card">
          <div class="head"><a class="author" href="/member/${POST.author_id}">👤 ${esc(POST.author_name)}</a>
            <span>· ${esc((POST.created_at || "").slice(0, 10))}</span> ${tagChips(POST.tags)}
            <span class="spacer"></span>
            ${POST.author_id === ME.id ? '<button id="editBtn">수정</button>' : ''}
          </div>
          ${sectionsHtml(POST)}
          <div class="actions">
            <button class="reactBtn ${reacted ? 'reacted' : ''}" data-id="${PID}">👍 <span class="rc">${POST.reaction_count}</span></button>
          </div>
        </div>`;
      document.querySelector(".reactBtn").onclick = e => toggleReact(PID, e.currentTarget);
      if (POST.author_id === ME.id) {
        document.getElementById("editBtn").onclick = openEditor;
      }
      renderComments(data.comments);
    }

    function renderComments(comments) {
      document.getElementById("comments").innerHTML = comments.map(c =>
        `<div class="comment"><span class="who">${esc(c.author_name)}</span>: ${esc(c.body)}</div>`
      ).join("");
    }

    function openEditor() {
      const e = document.getElementById("editor");
      document.getElementById("did").value = POST.did;
      document.getElementById("learned").value = POST.learned;
      document.getElementById("blocked").value = POST.blocked;
      document.getElementById("tags").value = POST.tags;
      document.getElementById("links").value = POST.links || "";
      e.classList.remove("hidden");
    }

    document.getElementById("saveBtn").onclick = async () => {
      const r = await fetch(`/api/post/${PID}/edit`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          did: document.getElementById("did").value.trim(),
          learned: document.getElementById("learned").value.trim(),
          blocked: document.getElementById("blocked").value.trim(),
          tags: document.getElementById("tags").value.trim(),
          links: document.getElementById("links").value.trim()
        })
      });
      if (r.ok) location.reload(); else alert("수정 실패");
    };

    document.getElementById("cbtn").onclick = async () => {
      const body = document.getElementById("cbody").value.trim();
      if (!body) return;
      const r = await fetch(`/api/post/${PID}/comment`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ body })
      });
      if (r.ok) location.reload();
    };

    document.getElementById("cbody").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("cbtn").click();
    });

    load();
  </script>
</body>
</html>
